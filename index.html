<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ビッグドリーム 推定IN枚数計算</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 12px;
    }

    h1 {
      font-size: clamp(0.85rem, 3.5vw, 1.1rem);
      font-weight: bold;
      text-align: center;
      margin-bottom: 4px;
      color: #ffd700;
      line-height: 1.4;
    }

    .subtitle {
      text-align: center;
      font-size: clamp(0.7rem, 2.8vw, 0.85rem);
      color: #aaa;
      margin-bottom: 16px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background: #16213e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px;
    }

    .card-header {
      font-size: 0.85rem;
      color: #ffd700;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .card-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .field label {
      display: block;
      font-size: 0.72rem;
      color: #aaa;
      margin-bottom: 4px;
    }

    .field input {
      width: 100%;
      padding: 10px 8px;
      background: #0f3460;
      border: 1px solid #444;
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
      text-align: center;
      -moz-appearance: textfield;
      -webkit-appearance: none;
    }
    .field input::-webkit-inner-spin-button,
    .field input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .field input:focus { outline: 2px solid #ffd700; }

    .card-result {
      text-align: right;
      font-size: 0.78rem;
      color: #aaa;
    }
    .card-result span {
      color: #7efff5;
      font-size: 1.1rem;
      font-weight: bold;
      margin-left: 6px;
    }

    .total-box {
      background: #16213e;
      border: 2px solid #ffd700;
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
    }
    .total-box .label {
      color: #ffd700;
      font-weight: bold;
      font-size: 0.95rem;
    }
    .total-box .value {
      color: #ffd700;
      font-size: 1.4rem;
      font-weight: bold;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .btn-add {
      flex: 1;
      padding: 13px;
      background: #0f3460;
      color: #7efff5;
      border: 1px solid #7efff5;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: bold;
    }
    .btn-clear {
      flex: 1;
      padding: 13px;
      background: #333;
      color: #eee;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: bold;
    }

    .note {
      text-align: center;
      font-size: 0.7rem;
      color: #555;
      margin-top: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<h1>スマスロ ビッグドリームTHE GOLDEN PUSHER<br>推定IN枚数計算</h1>
<p class="subtitle">50枚/千円・約30.7G で試算</p>

<div class="cards" id="cards"></div>

<div class="total-box" style="margin-top:14px;">
  <span class="label">推定IN枚数 合計</span>
  <span class="value" id="totalCell">—</span>
</div>

<div class="btn-row">
  <button class="btn-add" onclick="addCard()">＋ 追加</button>
  <button class="btn-clear" onclick="clearAll()">リセット</button>
</div>

<p class="note">G数 ÷ 30.7 ＝ 千円数（四捨五入）→ ×50枚 − 払出し枚数 ＝ 推定IN枚数</p>

<script>
  const RATE = 30.7;
  const MEDALS_PER_1K = 50;
  let count = 0;

  function addCard() {
    count++;
    const container = document.getElementById('cards');
    const div = document.createElement('div');
    div.className = 'card';
    div.id = `card${count}`;
    div.innerHTML = `
      <div class="card-header">${count}回目</div>
      <div class="card-fields">
        <div class="field">
          <label>初当たりまでのG数</label>
          <input type="number" id="g${count}" placeholder="例: 413" min="0" inputmode="numeric" oninput="calculate()">
        </div>
        <div class="field">
          <label>払出し枚数</label>
          <input type="number" id="p${count}" placeholder="例: 393" min="0" inputmode="numeric" oninput="calculate()">
        </div>
      </div>
      <div class="card-result">推定IN枚数：<span id="r${count}">—</span></div>
    `;
    container.appendChild(div);
  }

  function calculate() {
    let total = 0;
    let hasAny = false;
    for (let i = 1; i <= count; i++) {
      const g = parseFloat(document.getElementById(`g${i}`)?.value);
      const p = parseFloat(document.getElementById(`p${i}`)?.value);
      const rEl = document.getElementById(`r${i}`);
      if (!isNaN(g) && g >= 0 && !isNaN(p) && p >= 0) {
        const val = Math.round(g / RATE) * MEDALS_PER_1K - p;
        rEl.textContent = val.toLocaleString() + '枚';
        total += val;
        hasAny = true;
      } else {
        if (rEl) rEl.textContent = '—';
      }
    }
    document.getElementById('totalCell').textContent = hasAny ? total.toLocaleString() + '枚' : '—';
  }

  function clearAll() {
    for (let i = 1; i <= count; i++) {
      const g = document.getElementById(`g${i}`);
      const p = document.getElementById(`p${i}`);
      const r = document.getElementById(`r${i}`);
      if (g) g.value = '';
      if (p) p.value = '';
      if (r) r.textContent = '—';
    }
    document.getElementById('totalCell').textContent = '—';
  }

  for (let i = 0; i < 5; i++) addCard();
</script>

</body>
</html>
